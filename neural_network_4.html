<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Network</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildNetwork();
  startWave();
});

// ── Network layout ──────────────────────────────────────────────────────────
const LAYER_DEFS    = [3, 5, 7, 9, 9, 9, 9, 7, 5, 3];
const INPUT_LABELS  = ['S', 'T', 'D'];
const OUTPUT_LABELS = ['STUDY', 'TO', 'DEATH'];
const CONN_PROB     = 0.55;

let layers      = [];
let connections = [];

function buildNetwork() {
  layers      = [];
  connections = [];

  const margin   = W * 0.08;
  const usableW  = W - margin * 2;
  const layerGap = usableW / (LAYER_DEFS.length - 1);

  LAYER_DEFS.forEach((count, li) => {
    const x       = margin + li * layerGap;
    const neurons = [];
    const usableH = H * 0.72;
    const top     = H * 0.14;
    for (let ni = 0; ni < count; ni++) {
      const y = top + (usableH / (count + 1)) * (ni + 1);
      neurons.push({ x, y, r: 7, layer: li, idx: ni, glow: 0 });
    }
    layers.push({ x, neurons });
  });

  for (let li = 0; li < layers.length - 1; li++) {
    layers[li].neurons.forEach(a => {
      layers[li + 1].neurons.forEach(b => {
        const force = (LAYER_DEFS[li] <= 3 || LAYER_DEFS[li + 1] <= 3);
        if (force || Math.random() < CONN_PROB) {
          connections.push({ a, b, trail: 0 });
        }
      });
    });
  }
}
buildNetwork();

// ── Wave state ──────────────────────────────────────────────────────────────
let waveLayer  = 0;
let waveT      = 0;
let pauseTimer = 0;
const WAVE_SPEED   = 0.028;
const PAUSE_FRAMES = 35;

function ease(t) {
  return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
}

function lightLayer(li) {
  layers[li].neurons.forEach(n => { n.glow = 1.0; });
}

function startWave() {
  waveLayer = 0;
  waveT     = 0;
  lightLayer(0);
}
startWave();

// ── Draw ─────────────────────────────────────────────────────────────────────
function drawConnections() {
  connections.forEach(conn => {
    const { a, b } = conn;
    const isCurrent = (a.layer === waveLayer) && pauseTimer === 0;

    const trailAlpha = 0.10 + conn.trail * 0.45;
    if (conn.trail > 0) conn.trail = Math.max(0, conn.trail - 0.025);

    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = `rgba(255,255,255,${isCurrent ? trailAlpha + 0.15 : trailAlpha})`;
    ctx.lineWidth   = isCurrent ? 0.9 : 0.4;
    ctx.stroke();

    if (isCurrent) {
      const et = ease(waveT);
      const px = a.x + (b.x - a.x) * et;
      const py = a.y + (b.y - a.y) * et;

      const grad = ctx.createRadialGradient(px, py, 0, px, py, 7);
      grad.addColorStop(0, 'rgba(255,255,255,0.35)');
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.beginPath();
      ctx.arc(px, py, 7, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(px, py, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
    }
  });
}

function drawNodes() {
  layers.forEach(layer => {
    layer.neurons.forEach(n => {
      if (n.glow > 0) {
        const glowR = n.r + 10 * n.glow;
        const grad  = ctx.createRadialGradient(n.x, n.y, n.r * 0.5, n.x, n.y, glowR);
        grad.addColorStop(0, `rgba(255,255,255,${0.4 * n.glow})`);
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.beginPath();
        ctx.arc(n.x, n.y, glowR, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        n.glow = Math.max(0, n.glow - 0.022);
      }

      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fillStyle   = n.glow > 0.3 ? '#fff' : '#000';
      ctx.strokeStyle = '#fff';
      ctx.lineWidth   = 1.5;
      ctx.fill();
      ctx.stroke();
    });
  });
}

function drawLabels() {
  const lastIdx = layers.length - 1;
  layers.forEach((layer, li) => {
    layer.neurons.forEach((n, ni) => {
      if (li === 0 && ni < INPUT_LABELS.length) {
        ctx.font         = 'bold 11px monospace';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle    = n.glow > 0.3 ? '#000' : '#fff';
        ctx.fillText(INPUT_LABELS[ni], n.x, n.y);
      }
      if (li === lastIdx && ni < OUTPUT_LABELS.length) {
        ctx.font         = 'bold 9px monospace';
        ctx.textAlign    = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillStyle    = `rgba(255,255,255,${0.4 + n.glow * 0.6})`;
        ctx.fillText(OUTPUT_LABELS[ni], n.x + n.r + 5, n.y);
      }
    });
  });
}

// ── Main loop ─────────────────────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  if (pauseTimer > 0) {
    pauseTimer--;
    if (pauseTimer === 0) startWave();
  } else {
    waveT += WAVE_SPEED;

    if (waveT >= 1) {
      connections
        .filter(c => c.a.layer === waveLayer)
        .forEach(c => { c.trail = 1.0; });

      lightLayer(waveLayer + 1);
      waveLayer++;
      waveT = 0;

      if (waveLayer >= layers.length - 1) {
        pauseTimer = PAUSE_FRAMES;
        waveLayer  = 0;
        waveT      = 0;
      }
    }
  }

  drawConnections();
  drawNodes();
  drawLabels();
}

loop();
</script>
</body>
</html>
