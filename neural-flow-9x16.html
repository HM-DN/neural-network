<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Flow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #wrap {
    position: relative;
    aspect-ratio: 9 / 16;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: #000;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
</div>

<script>
const wrap = document.getElementById('wrap');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W = 0, H = 0;

function resize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  let w, h;
  if (vw / vh < 9 / 16) {
    w = vw; h = vw * 16 / 9;
  } else {
    h = vh; w = vh * 9 / 16;
  }
  wrap.style.width  = w + 'px';
  wrap.style.height = h + 'px';
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  W = w; H = h;
  buildNetwork();
}

/* ── Network ─────────────────────────────────────────── */
const LAYER_DEFS    = [3, 5, 7, 9, 9, 9, 9, 7, 5, 3];
const INPUT_LABELS  = ['S', 'T', 'D'];
const OUTPUT_LABELS = ['STUDY', 'TO', 'DEATH'];
const CONN_PROB     = 0.55;
const MAX_PARTICLES = 320;

let layers = [], connections = [];

function buildNetwork() {
  layers = []; connections = [];
  const mx  = W * 0.07;
  const uw  = W - mx * 2;
  const lg  = uw / (LAYER_DEFS.length - 1);
  LAYER_DEFS.forEach((count, li) => {
    const x  = mx + li * lg;
    const uh = H * 0.74;
    const top = H * 0.13;
    const neurons = [];
    for (let ni = 0; ni < count; ni++) {
      neurons.push({
        x, y: top + (uh / (count + 1)) * (ni + 1),
        r: 6.5, layer: li, idx: ni, glow: 0
      });
    }
    layers.push({ x, neurons });
  });
  for (let li = 0; li < layers.length - 1; li++) {
    layers[li].neurons.forEach(a => {
      layers[li + 1].neurons.forEach(b => {
        const force = LAYER_DEFS[li] <= 3 || LAYER_DEFS[li + 1] <= 3;
        if (force || Math.random() < CONN_PROB) {
          connections.push({ a, b });
        }
      });
    });
  }
}

/* ── Particles ───────────────────────────────────────── */
let particles = [];

function spawnWave() {
  if (particles.length >= MAX_PARTICLES) return;
  layers[0].neurons.forEach(n => {
    n.glow = 1.0;
    connections
      .filter(c => c.a === n)
      .forEach(conn => particles.push({
        conn,
        t: 0,
        speed: 0.024 + Math.random() * 0.009
      }));
  });
}

function ease(t) {
  return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
}

function updateParticles() {
  const arrived = [];
  particles.forEach((p, i) => {
    p.t += p.speed;
    if (p.t >= 1) arrived.push(i);
  });
  const toAdd = [];
  arrived.reverse().forEach(i => {
    const p   = particles[i];
    const dest = p.conn.b;
    dest.glow  = Math.min(1.0, dest.glow + 0.9);
    if (particles.length < MAX_PARTICLES) {
      connections
        .filter(c => c.a === dest)
        .forEach(conn => toAdd.push({
          conn,
          t: 0,
          speed: 0.024 + Math.random() * 0.009
        }));
    }
    particles.splice(i, 1);
  });
  toAdd.forEach(p => particles.push(p));
}

/* ── Draw ─────────────────────────────────────────────── */
function drawConnections() {
  connections.forEach(({ a, b }) => {
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 0.4;
    ctx.stroke();
  });
}

function drawParticles() {
  particles.forEach(p => {
    const { a, b } = p.conn;
    const et = ease(Math.min(p.t, 1));
    const px = a.x + (b.x - a.x) * et;
    const py = a.y + (b.y - a.y) * et;

    const g = ctx.createRadialGradient(px, py, 0, px, py, 10);
    g.addColorStop(0, 'rgba(255,255,255,0.30)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.arc(px, py, 10, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(px, py, 2.4, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
  });
}

function drawNodes() {
  layers.forEach(layer => {
    layer.neurons.forEach(n => {
      if (n.glow > 0) {
        const gr = n.r + 14 * n.glow;
        const grad = ctx.createRadialGradient(n.x, n.y, n.r * 0.4, n.x, n.y, gr);
        grad.addColorStop(0, `rgba(255,255,255,${0.40 * n.glow})`);
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.beginPath();
        ctx.arc(n.x, n.y, gr, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        n.glow = Math.max(0, n.glow - 0.016);
      }
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fillStyle   = n.glow > 0.22 ? '#fff' : '#000';
      ctx.strokeStyle = 'rgba(255,255,255,0.88)';
      ctx.lineWidth   = 1.5;
      ctx.fill();
      ctx.stroke();
    });
  });
}

function drawLabels() {
  const lastIdx = layers.length - 1;
  layers.forEach((layer, li) => {
    layer.neurons.forEach((n, ni) => {
      if (li === 0 && ni < INPUT_LABELS.length) {
        ctx.font         = 'bold 11px monospace';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle    = n.glow > 0.22 ? '#000' : '#fff';
        ctx.fillText(INPUT_LABELS[ni], n.x, n.y);
      }
      if (li === lastIdx && ni < OUTPUT_LABELS.length) {
        ctx.font         = 'bold 9px monospace';
        ctx.textAlign    = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillStyle    = `rgba(255,255,255,${0.35 + n.glow * 0.65})`;
        ctx.fillText(OUTPUT_LABELS[ni], n.x + n.r + 6, n.y);
      }
    });
  });
}

/* ── Loop ─────────────────────────────────────────────── */
let lastSpawn = 0;
const SPAWN_INTERVAL_MS = 1000;

function loop(ts) {
  requestAnimationFrame(loop);

  if (ts - lastSpawn >= SPAWN_INTERVAL_MS) {
    spawnWave();
    lastSpawn = ts;
  }

  updateParticles();

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  drawConnections();
  drawParticles();
  drawNodes();
  drawLabels();
}

window.addEventListener('resize', resize);
resize();

// kick off two immediate waves so screen isn't empty at start
spawnWave();
setTimeout(spawnWave, 350);

requestAnimationFrame(ts => { lastSpawn = ts; loop(ts); });
</script>
</body>
</html>
