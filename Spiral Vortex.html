<canvas id="cv" style="display:block;width:100%;height:auto;background:#fff;"></canvas>
<script>
(function(){
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const CW=1080,CH=1920;
cv.width=CW;cv.height=CH;
const MX=CW/2,MY=CH/2;
const FOV=900;
let camY=0,camX=0.18,tick=0;

function ry(p,a){return{x:p.x*Math.cos(a)+p.z*Math.sin(a),y:p.y,z:-p.x*Math.sin(a)+p.z*Math.cos(a)};}
function rx(p,a){return{x:p.x,y:p.y*Math.cos(a)-p.z*Math.sin(a),z:p.y*Math.sin(a)+p.z*Math.cos(a)};}
function pr(p){
  const r=rx(ry(p,camY),camX);
  const s=FOV/(FOV+r.z+900);
  return{sx:MX+r.x*s,sy:MY+r.y*s,s:s,rz:r.z};
}

// ── Symbols ──────────────────────────────────────────────────
var S=[
  'dL/dw','grad f=0','sigma(x)','softmax','ReLU(x)','tanh(z)',
  'H=-sum p*log p','Q*K^T/sqrt(d)','KL(P||Q)','E[X]',
  'A*x+b','det(A-lI)=0','U*Sigma*V^T','||x||_2','rank(A)',
  'H*psi=E*psi','F=m*a','E=m*c^2','dx*dp >= h/2','curl B=mu*J',
  'loss.backward()','optimizer.step()','model.train()',
  'nn.Linear(d,d)','cross_entropy','torch.einsum',
  'x @ W.T + b','.cuda()','nn.Dropout(p)','BatchNorm',
  '01001101','10110011','0xFF3A','0b1010','0xDEADBEEF',
  'O(n log n)','O(n^2)','O(1)','NP-hard','P!=NP',
  'Var(X)','MLE','CLT','p<0.001','mu +/- 2*sigma',
  'Transformer','ResNet','LSTM','GAN','ViT','VAE','BERT','GPT',
  'd2f/dx2','Jacobian','Hessian','grad^2 L','eigenvalue',
  'W = W - lr*grad','Adam','SGD','momentum','weight decay',
  'argmax','argmin','sum i=1..n','prod p_i','lim n->inf',
  'y=W*x+b','d/dx e^x=e^x','backprop','chain rule',
  'vanishing grad','skip conn','layer norm','pos encoding',
  'multi-head attn','causal mask','residual stream',
  'policy grad','Q-learning','eps-greedy','RLHF',
  'sim-to-real','domain rand','zero-shot','few-shot',
  'trace(A*B)','null(A)','span(V)','outer product',
  'attention score','key query value','embedding',
  'overfitting','regularize','L2 norm','dropout',
  'cross entropy','MSE','BCE','Huber loss','triplet',
  'batch norm','group norm','weight norm','spectral norm',
  'convergence','stability','generalization','bias-variance',
  'w_ij','b_i','x_t','h_t','c_t','z_t','r_t','g_t',
  'forward pass','backward pass','gradient tape','autograd',
  'CUDA','tensor core','mixed precision','INT8 quant',
  'attention head','feed forward','projection','embedding dim',
  'token','logit','probability','temperature','top-k','top-p',
  'fine-tune','pre-train','distill','prune','quantize',
  'perplexity','BLEU','ROUGE','F1','AUC','precision','recall',
  'batch size','learning rate','epoch','warmup','scheduler',
  'grad clip','weight init','He init','Xavier init',
  'receptive field','kernel','stride','padding','dilation',
  'pooling','upsampling','skip connection','bottleneck',
  'softplus','GELU','Swish','Mish','ELU','SELU',
  'Frobenius norm','nuclear norm','spectral radius',
  'mutual info','entropy','cross entropy','KL divergence',
  'posterior','prior','likelihood','evidence','marginal',
  'Bayes rule','MAP','MLE','EM algorithm','variational',
  'Monte Carlo','MCMC','HMC','Langevin','diffusion',
  'score function','flow model','normalizing flow',
  'contrastive','triplet','InfoNCE','SimCLR','CLIP'
];

const parts=[];
function spawnPart(){
  const r=250+Math.random()*780;
  const th=Math.random()*Math.PI*2;
  const ph=(Math.random()-0.5)*Math.PI*0.92;
  parts.push({
    txt:S[Math.floor(Math.random()*S.length)],
    x:r*Math.cos(ph)*Math.cos(th),
    y:r*Math.cos(ph)*Math.sin(th)*2.3,
    z:r*Math.sin(ph),
    vx:(Math.random()-0.5)*0.22,
    vy:(Math.random()-0.5)*0.16,
    vz:(Math.random()-0.5)*0.22,
    life:0,maxL:220+Math.random()*320,
    sz:22+Math.random()*28
  });
}
for(let i=0;i<220;i++)spawnPart();

// ── Matrix rain ───────────────────────────────────────────────
var matCols=[];
for(var mc=0;mc<24;mc++){
  matCols.push({
    bx:-560+mc*48+Math.random()*22,
    by:-1050+Math.random()*200,
    bz:-230+Math.random()*120,
    digs:Array.from({length:60},function(){return Math.floor(Math.random()*10);}),
    sp:0.6+Math.random()*1.2
  });
}

// ── Sine waves ────────────────────────────────────────────────
var waves=[
  {ox:-420,oz:-120,amp:110,fr:0.020,ph:0.0},
  {ox: 220,oz: 230,amp: 75,fr:0.036,ph:1.4},
  {ox:-140,oz: 120,amp:130,fr:0.015,ph:2.6},
  {ox: 140,oz:-290,amp: 95,fr:0.028,ph:0.8},
  {ox:-310,oz: 200,amp: 70,fr:0.042,ph:3.2},
  {ox: 350,oz:-170,amp: 88,fr:0.024,ph:1.8},
  {ox:-80, oz:-80, amp:105,fr:0.032,ph:4.1},
  {ox: 80, oz: 320,amp: 60,fr:0.050,ph:0.3}
];

// ── Dashed long-range connections ─────────────────────────────
var llines=[];
function addLL(){
  if(parts.length<4)return;
  var a=parts[Math.floor(Math.random()*parts.length)];
  var b=parts[Math.floor(Math.random()*parts.length)];
  llines.push({
    fx:a.x,fy:a.y,fz:a.z,
    tx:b.x,ty:b.y,tz:b.z,
    life:0,maxL:100+Math.random()*120
  });
}
for(var i=0;i<20;i++)addLL();

// ── Orbit rings ───────────────────────────────────────────────
var orbs=[
  {rx:420,ry:  0,rz:260,sp:0.006,ph:0.0},
  {rx:  0,ry:380,rz:380,sp:0.009,ph:2.1},
  {rx:340,ry:340,rz:  0,sp:0.007,ph:1.0},
  {rx:500,ry:220,rz:220,sp:0.005,ph:0.5},
  {rx:220,ry:500,rz:180,sp:0.008,ph:3.7},
  {rx:300,ry:120,rz:400,sp:0.011,ph:1.3}
];

// ── Floating dot swarm (replaces pulses) ──────────────────────
var dots=[];
function addDot(){
  const r=150+Math.random()*500;
  const th=Math.random()*Math.PI*2;
  const ph=(Math.random()-0.5)*Math.PI*0.9;
  dots.push({
    x:r*Math.cos(ph)*Math.cos(th),
    y:r*Math.cos(ph)*Math.sin(th)*2.0,
    z:r*Math.sin(ph),
    vx:(Math.random()-0.5)*0.4,
    vy:(Math.random()-0.5)*0.3,
    vz:(Math.random()-0.5)*0.4,
    life:0,maxL:150+Math.random()*200,
    r:1.5+Math.random()*3
  });
}
for(var d=0;d<80;d++)addDot();

// ── Draw ──────────────────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,CW,CH);
  ctx.fillStyle='#ffffff';
  ctx.fillRect(0,0,CW,CH);

  camY=tick*0.0021;
  camX=0.15+Math.sin(tick*0.00075)*0.13;

  // Grid
  ctx.strokeStyle='rgba(26,26,26,0.022)';
  ctx.lineWidth=1;
  for(var gx=-560;gx<=560;gx+=65){
    var g1=pr({x:gx,y:-990,z:-110}),g2=pr({x:gx,y:990,z:-110});
    ctx.beginPath();ctx.moveTo(g1.sx,g1.sy);ctx.lineTo(g2.sx,g2.sy);ctx.stroke();
  }
  for(var gy=-990;gy<=990;gy+=65){
    var g3=pr({x:-560,y:gy,z:-110}),g4=pr({x:560,y:gy,z:-110});
    ctx.beginPath();ctx.moveTo(g3.sx,g3.sy);ctx.lineTo(g4.sx,g4.sy);ctx.stroke();
  }

  // Orbit rings
  orbs.forEach(function(o){
    ctx.strokeStyle='rgba(26,26,26,0.04)';
    ctx.lineWidth=1;
    ctx.beginPath();
    for(var k=0;k<=81;k++){
      var a=(k/80)*Math.PI*2+tick*o.sp+o.ph;
      var pt=pr({x:o.rx*Math.cos(a),y:o.ry*Math.sin(a)*1.4,z:o.rz*Math.sin(a)*0.5});
      if(k===0)ctx.moveTo(pt.sx,pt.sy);else ctx.lineTo(pt.sx,pt.sy);
    }
    ctx.stroke();
    var da=tick*o.sp+o.ph;
    var dp=pr({x:o.rx*Math.cos(da),y:o.ry*Math.sin(da)*1.4,z:o.rz*Math.sin(da)*0.5});
    ctx.fillStyle='rgba(26,26,26,0.55)';
    ctx.beginPath();ctx.arc(dp.sx,dp.sy,5*dp.s,0,Math.PI*2);ctx.fill();
  });

  // Sine waves
  waves.forEach(function(w){
    ctx.strokeStyle='rgba(26,26,26,0.05)';
    ctx.lineWidth=1.3;
    ctx.beginPath();
    var first=true;
    for(var px=-450;px<=450;px+=5){
      var py=w.amp*Math.sin(px*w.fr+tick*0.018+w.ph);
      var pt=pr({x:w.ox+px,y:py,z:w.oz});
      if(first){ctx.moveTo(pt.sx,pt.sy);first=false;}
      else ctx.lineTo(pt.sx,pt.sy);
    }
    ctx.stroke();
  });

  // Dashed long-range lines
  for(var li=llines.length-1;li>=0;li--){
    var ll=llines[li];
    ll.life++;
    if(ll.life>ll.maxL){llines.splice(li,1);if(llines.length<20)addLL();continue;}
    var fa=Math.min(ll.life/20,1)*Math.min((ll.maxL-ll.life)/20,1);
    var la=pr({x:ll.fx,y:ll.fy,z:ll.fz});
    var lb=pr({x:ll.tx,y:ll.ty,z:ll.tz});
    ctx.strokeStyle='rgba(26,26,26,'+fa*0.12+')';
    ctx.lineWidth=0.9;
    ctx.setLineDash([6,10]);
    ctx.beginPath();ctx.moveTo(la.sx,la.sy);ctx.lineTo(lb.sx,lb.sy);ctx.stroke();
    ctx.setLineDash([]);
  }

  // Floating dots
  for(var di=dots.length-1;di>=0;di--){
    var dt=dots[di];
    dt.life++;dt.x+=dt.vx;dt.y+=dt.vy;dt.z+=dt.vz;
    if(dt.life>dt.maxL){dots.splice(di,1);if(dots.length<80)addDot();continue;}
    var fade=Math.min(dt.life/20,1)*Math.min((dt.maxL-dt.life)/20,1);
    var dp2=pr({x:dt.x,y:dt.y,z:dt.z});
    ctx.fillStyle='rgba(26,26,26,'+fade*0.7+')';
    ctx.beginPath();ctx.arc(dp2.sx,dp2.sy,dt.r*dp2.s,0,Math.PI*2);ctx.fill();
  }

  // Matrix rain
  matCols.forEach(function(col){
    col.by+=col.sp;
    if(col.by>1100)col.by=-1080;
    for(var ci=0;ci<col.digs.length;ci++){
      var py3=col.by+ci*22;
      if(py3<-1100||py3>1150)continue;
      var pp=pr({x:col.bx,y:py3,z:col.bz});
      var al=0.048+0.032*Math.sin(ci*0.45+tick*0.038);
      ctx.font=Math.max(9,14*pp.s)+'px monospace';
      ctx.fillStyle='rgba(26,26,26,'+al+')';
      ctx.fillText(String(col.digs[ci]),pp.sx,pp.sy);
    }
    if(tick%5===0)col.digs[Math.floor(Math.random()*col.digs.length)]=Math.floor(Math.random()*10);
  });

  // Text particles
  var dead=[];
  var sorted=parts.map(function(p,i){return{p:p,i:i,pp:pr({x:p.x,y:p.y,z:p.z})};})
    .sort(function(a,b){return b.pp.rz-a.pp.rz;});

  sorted.forEach(function(item){
    var p=item.p,i=item.i,pp=item.pp;
    p.life++;p.x+=p.vx;p.y+=p.vy;p.z+=p.vz;
    if(p.life>p.maxL){dead.push(i);return;}
    var fade=Math.min(p.life/22,1)*Math.min((p.maxL-p.life)/22,1);
    var al=fade*Math.min(0.72,pp.s*1.25);
    var fs=Math.max(11,p.sz*pp.s);
    ctx.font=fs+'px monospace';
    ctx.fillStyle='rgba(26,26,26,'+al+')';
    ctx.fillText(p.txt,pp.sx,pp.sy);
  });

  dead.sort(function(a,b){return b-a;}).forEach(function(i){parts.splice(i,1);});
  while(parts.length<225)spawnPart();

  tick++;
  requestAnimationFrame(draw);
}
draw();
})();
</script>
