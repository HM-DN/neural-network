<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Network</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildNetwork();
});

// ── Network layout ─────────────────────────────────────────────────────────
const LAYER_DEFS = [3, 5, 7, 9, 9, 9, 9, 7, 5, 3];

const INPUT_LABELS  = ['S', 'T', 'D'];
const OUTPUT_LABELS = ['STUDY', 'TO', 'DEATH'];

let layers = [];
let connections = [];

const CONN_PROB  = 0.55;
const MAX_SIGNALS = 25;

function countSignals() {
  let n = 0;
  connections.forEach(c => { n += c.signals.length; });
  return n;
}

function buildNetwork() {
  layers = [];
  connections = [];

  const margin   = W * 0.08;
  const usableW  = W - margin * 2;
  const layerGap = usableW / (LAYER_DEFS.length - 1);

  LAYER_DEFS.forEach((count, li) => {
    const x = margin + li * layerGap;
    const neurons = [];
    const usableH = H * 0.72;
    const top     = H * 0.14;
    for (let ni = 0; ni < count; ni++) {
      const y = top + (usableH / (count + 1)) * (ni + 1);
      neurons.push({ x, y, r: 7, layer: li, idx: ni, lit: false, litTimer: 0 });
    }
    layers.push({ x, neurons });
  });

  for (let li = 0; li < layers.length - 1; li++) {
    layers[li].neurons.forEach(a => {
      layers[li + 1].neurons.forEach(b => {
        const forceConnect = (LAYER_DEFS[li] <= 3 || LAYER_DEFS[li + 1] <= 3);
        if (forceConnect || Math.random() < CONN_PROB) {
          connections.push({ a, b, signals: [], active: false, activeTimer: 0 });
        }
      });
    });
  }
}
buildNetwork();

// ── Signal spawner ─────────────────────────────────────────────────────────
let spawnTimer = 0;
const SPAWN_INTERVAL = 45;

function spawnWave() {
  if (countSignals() >= MAX_SIGNALS) return;
  const src = layers[0].neurons[Math.floor(Math.random() * layers[0].neurons.length)];
  src.lit = true;
  src.litTimer = 30;
  cascadeFrom(src, 0);
}

function cascadeFrom(neuron, depth) {
  if (depth >= LAYER_DEFS.length - 1) return;
  const relevant = connections.filter(c => c.a === neuron);
  const maxFan = Math.min(relevant.length, depth < 2 ? 5 : 3);
  const chosen = relevant.sort(() => Math.random() - 0.5).slice(0, maxFan);

  chosen.forEach(conn => {
    if (countSignals() >= MAX_SIGNALS) return;
    const delay = depth * 80 + Math.random() * 40;
    setTimeout(() => {
      if (countSignals() < MAX_SIGNALS) {
        conn.signals.push({ t: 0, speed: 0.012 + Math.random() * 0.008 });
        conn.active = true;
        conn.activeTimer = 20;
      }
    }, delay);
    setTimeout(() => cascadeFrom(conn.b, depth + 1), delay + 500);
  });
}

// ── Draw ────────────────────────────────────────────────────────────────────
function drawNode(n) {
  ctx.beginPath();
  ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
  ctx.fillStyle   = n.lit ? '#fff' : '#000';
  ctx.strokeStyle = '#fff';
  ctx.lineWidth   = 1.5;
  ctx.fill();
  ctx.stroke();

  if (n.litTimer > 0) n.litTimer--;
  if (n.litTimer === 0) n.lit = false;
}

function drawConnection(conn) {
  const { a, b } = conn;

  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.strokeStyle = conn.active ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.12)';
  ctx.lineWidth   = conn.active ? 1.0 : 0.5;
  ctx.stroke();

  conn.signals = conn.signals.filter(s => s.t < 1);
  conn.signals.forEach(sig => {
    const px = a.x + (b.x - a.x) * sig.t;
    const py = a.y + (b.y - a.y) * sig.t;

    ctx.beginPath();
    ctx.arc(px, py, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();

    if (sig.t >= 0.95) {
      b.lit = true;
      b.litTimer = 20;
    }
    sig.t += sig.speed;
  });

  if (conn.activeTimer > 0) conn.activeTimer--;
  if (conn.activeTimer === 0) conn.active = false;
}

function drawLabels() {
  const lastLayerIdx = layers.length - 1;
  layers.forEach((layer, li) => {
    layer.neurons.forEach((n, ni) => {
      if (li === 0 && ni < INPUT_LABELS.length) {
        ctx.font         = 'bold 11px monospace';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle    = n.lit ? '#000' : '#fff';
        ctx.fillText(INPUT_LABELS[ni], n.x, n.y);
      }
      if (li === lastLayerIdx && ni < OUTPUT_LABELS.length) {
        ctx.font         = 'bold 9px monospace';
        ctx.textAlign    = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillStyle    = '#fff';
        ctx.fillText(OUTPUT_LABELS[ni], n.x + n.r + 5, n.y);
      }
    });
  });
}

function loop() {
  requestAnimationFrame(loop);

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  connections.forEach(drawConnection);
  layers.forEach(layer => layer.neurons.forEach(drawNode));
  drawLabels();

  spawnTimer++;
  if (spawnTimer >= SPAWN_INTERVAL) {
    spawnTimer = 0;
    spawnWave();
  }
}

loop();
</script>
</body>
</html>
