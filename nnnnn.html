<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hyper Chaotic Neural Network</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
    canvas { display: block; }

    #hud {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
    }
    .btn {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 7px 18px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }
    .btn:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border-color: rgba(255,255,255,0.6);
    }
    .btn.active {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border-color: #fff;
    }

    #entropy-bar {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      z-index: 10;
    }
    #entropy-label {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.35);
    }
    #entropy-track {
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,0.08);
      position: relative;
    }
    #entropy-fill {
      height: 100%;
      background: #fff;
      transition: width 0.1s linear;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<div id="entropy-bar">
  <div id="entropy-label">ENTROPY</div>
  <div id="entropy-track"><div id="entropy-fill" style="width:0%"></div></div>
</div>

<div id="hud">
  <button class="btn active" id="btnChaos">CHAOS</button>
  <button class="btn" id="btnFreeze">FREEZE</button>
  <button class="btn" id="btnExplode">EXPLODE</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const entropyFill = document.getElementById('entropy-fill');

let W, H;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); });

// ── Config ────────────────────────────────────────────────────────────────
const NODE_COUNT     = 62;
const MAX_CONN_DIST  = 0.38;   // fraction of scene radius
const MAX_CONNS_PER  = 5;
const BASE_DRIFT     = 0.0012;
const CHAOS_INTERVAL = 180;    // frames between chaos bursts
const SIGNAL_COUNT   = 38;
const FOCAL_FACTOR   = 1.3;

// ── State ─────────────────────────────────────────────────────────────────
let nodes = [];
let signals = [];
let frame = 0;
let chaos = 0;         // 0..1 current chaos energy
let frozen = false;
let globalAngleX = 0;
let globalAngleY = 0;
let entropy = 0;       // visual entropy meter 0..1

// ── Node ──────────────────────────────────────────────────────────────────
function makeNode(i) {
  const spread = 0.85;
  // Uniformly distributed on a sphere shell + inner volume
  const r = 0.3 + Math.random() * 0.7;
  const theta = Math.random() * Math.PI * 2;
  const phi   = Math.acos(2 * Math.random() - 1);

  return {
    id: i,
    // base 3D position (normalized -1..1)
    bx: r * Math.sin(phi) * Math.cos(theta) * spread,
    by: r * Math.sin(phi) * Math.sin(theta) * spread,
    bz: r * Math.cos(phi) * spread,
    // velocity
    vx: (Math.random() - 0.5) * BASE_DRIFT * 2,
    vy: (Math.random() - 0.5) * BASE_DRIFT * 2,
    vz: (Math.random() - 0.5) * BASE_DRIFT * 2,
    // target (for chaos jumps)
    tx: 0, ty: 0, tz: 0,
    chasing: false,
    // projected
    sx: 0, sy: 0, scale: 1, depth: 0,
    // glow
    glow: 0,
    // personality
    mass: 0.7 + Math.random() * 0.6,
    size: 3 + Math.random() * 5,
  };
}

function initNodes() {
  nodes = [];
  for (let i = 0; i < NODE_COUNT; i++) nodes.push(makeNode(i));
}

// ── Connections (dynamic proximity) ──────────────────────────────────────
let connections = [];
function rebuildConnections() {
  connections = [];
  const scene = Math.min(W, H) * 0.45;
  const distThresh = scene * MAX_CONN_DIST;
  const distThreshSq = distThresh * distThresh;

  for (let i = 0; i < nodes.length; i++) {
    let count = 0;
    for (let j = i + 1; j < nodes.length; j++) {
      if (count >= MAX_CONNS_PER) break;
      const a = nodes[i], b = nodes[j];
      const dx = a.sx - b.sx, dy = a.sy - b.sy;
      const dsq = dx * dx + dy * dy;
      if (dsq < distThreshSq) {
        connections.push({ a, b, dist: Math.sqrt(dsq), maxDist: distThresh, glow: 0 });
        count++;
      }
    }
  }
}

// ── Signals ───────────────────────────────────────────────────────────────
function makeSignal() {
  return {
    from: Math.floor(Math.random() * nodes.length),
    to:   Math.floor(Math.random() * nodes.length),
    t: 0,
    speed: 0.012 + Math.random() * 0.018,
  };
}

function initSignals() {
  signals = [];
  for (let i = 0; i < SIGNAL_COUNT; i++) {
    const s = makeSignal();
    s.t = Math.random();
    signals.push(s);
  }
}

// ── Chaos ─────────────────────────────────────────────────────────────────
function triggerChaos(intensity = 1.0) {
  chaos = intensity;
  const spread = 0.85;
  nodes.forEach(n => {
    const r = 0.3 + Math.random() * 0.7;
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    n.tx = r * Math.sin(phi) * Math.cos(theta) * spread;
    n.ty = r * Math.sin(phi) * Math.sin(theta) * spread;
    n.tz = r * Math.cos(phi) * spread;
    n.chasing = true;
    n.vx += (Math.random() - 0.5) * 0.04 * intensity;
    n.vy += (Math.random() - 0.5) * 0.04 * intensity;
    n.vz += (Math.random() - 0.5) * 0.04 * intensity;
  });
}

function triggerExplode() {
  nodes.forEach(n => {
    const mag = 0.05 + Math.random() * 0.08;
    const len = Math.sqrt(n.bx*n.bx + n.by*n.by + n.bz*n.bz) || 1;
    n.vx = (n.bx / len) * mag;
    n.vy = (n.by / len) * mag;
    n.vz = (n.bz / len) * mag;
    n.chasing = false;
  });
  chaos = 1.0;
}

// ── Init ──────────────────────────────────────────────────────────────────
initNodes();
initSignals();

// ── UI ────────────────────────────────────────────────────────────────────
let chaosModeActive = true;
document.getElementById('btnChaos').addEventListener('click', () => {
  chaosModeActive = !chaosModeActive;
  document.getElementById('btnChaos').classList.toggle('active', chaosModeActive);
});
document.getElementById('btnFreeze').addEventListener('click', () => {
  frozen = !frozen;
  document.getElementById('btnFreeze').classList.toggle('active', frozen);
});
document.getElementById('btnExplode').addEventListener('click', () => {
  triggerExplode();
});

// ── Projection ────────────────────────────────────────────────────────────
function project(n) {
  const scene = Math.min(W, H) * 0.42;
  const focal  = Math.min(W, H) * FOCAL_FACTOR;

  // Rotate around X axis
  const cosX = Math.cos(globalAngleX), sinX = Math.sin(globalAngleX);
  const y1 = n.bx * 0 + n.by * cosX - n.bz * sinX;  // wait, need proper order
  // Actually: Ry then Rx
  // First rotate around Y:
  const cosY = Math.cos(globalAngleY), sinY = Math.sin(globalAngleY);
  const rx = n.bx * cosY + n.bz * sinY;
  const rz = -n.bx * sinY + n.bz * cosY;
  // Then rotate around X:
  const ry2 = n.by * cosX - rz * sinX;
  const rz2 = n.by * sinX + rz * cosX;

  const s = focal / (focal + rz2 * scene);
  n.sx = W / 2 + rx * scene * s;
  n.sy = H / 2 + ry2 * scene * s;
  n.scale = s;
  n.depth = rz2;
}

// ── Draw ──────────────────────────────────────────────────────────────────
function drawConnection(c) {
  const alpha = (1 - c.dist / c.maxDist);
  const g = c.glow;
  const baseAlpha = alpha * 0.18 + g * 0.35;
  if (baseAlpha < 0.01) return;
  const avgS = (c.a.scale + c.b.scale) * 0.5;
  ctx.beginPath();
  ctx.moveTo(c.a.sx, c.a.sy);
  ctx.lineTo(c.b.sx, c.b.sy);
  ctx.strokeStyle = `rgba(255,255,255,${Math.min(1, baseAlpha)})`;
  ctx.lineWidth = (0.4 + g * 0.9) * avgS;
  ctx.stroke();
  if (c.glow > 0) c.glow *= 0.88;
}

function drawNode(n) {
  const g = n.glow;
  const r = n.size * n.scale;

  // outer halo
  if (g > 0.05) {
    const grad = ctx.createRadialGradient(n.sx, n.sy, 0, n.sx, n.sy, r * (4 + g * 6));
    grad.addColorStop(0, `rgba(255,255,255,${0.15 * g})`);
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.arc(n.sx, n.sy, r * (4 + g * 6), 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // core
  ctx.beginPath();
  ctx.arc(n.sx, n.sy, r, 0, Math.PI * 2);
  const brightness = 0.4 + g * 0.6;
  ctx.fillStyle = `rgba(255,255,255,${brightness})`;
  ctx.fill();

  // inner spark
  if (g > 0.3) {
    ctx.beginPath();
    ctx.arc(n.sx, n.sy, r * 0.45, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
  }
}

function drawSignal(sig) {
  const a = nodes[sig.from], b = nodes[sig.to];
  if (!a || !b) return;
  const t = sig.t;
  const x = a.sx + (b.sx - a.sx) * t;
  const y = a.sy + (b.sy - a.sy) * t;

  // trail
  const t0 = Math.max(0, t - 0.12);
  const tx = a.sx + (b.sx - a.sx) * t0;
  const ty = a.sy + (b.sy - a.sy) * t0;

  const s = a.scale + (b.scale - a.scale) * t;

  ctx.beginPath();
  ctx.moveTo(tx, ty);
  ctx.lineTo(x, y);
  ctx.strokeStyle = `rgba(255,255,255,${0.55 * (1 - t * 0.3)})`;
  ctx.lineWidth = 1.6 * s;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(x, y, 2.2 * s, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  // activate nodes
  if (t > 0.88) b.glow = Math.max(b.glow, (t - 0.88) / 0.12);
  if (t < 0.12) a.glow = Math.max(a.glow, 1 - t / 0.12);

  // activate nearby connections
  connections.forEach(c => {
    if ((c.a === a && c.b === b) || (c.a === b && c.b === a)) {
      c.glow = Math.max(c.glow, 0.6);
    }
  });
}

// ── Main loop ─────────────────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  frame++;

  ctx.fillStyle = 'rgba(0,0,0,0.82)';
  ctx.fillRect(0, 0, W, H);

  // ── Physics ──────────────────────────────────────────────────────────
  if (!frozen) {
    // Auto chaos trigger
    if (chaosModeActive && frame % CHAOS_INTERVAL === 0) {
      triggerChaos(0.5 + Math.random() * 0.5);
    }

    // Decay chaos energy
    chaos *= 0.985;
    entropy = Math.max(entropy, chaos);
    entropy *= 0.993;
    entropyFill.style.width = (entropy * 100).toFixed(1) + '%';

    globalAngleY += 0.003 + chaos * 0.018;
    globalAngleX += 0.0012 + chaos * 0.009;

    nodes.forEach(n => {
      if (n.chasing) {
        // Lerp toward target with overshoot
        const lerpSpeed = (0.022 + chaos * 0.06) / n.mass;
        n.vx += (n.tx - n.bx) * lerpSpeed;
        n.vy += (n.ty - n.by) * lerpSpeed;
        n.vz += (n.tz - n.bz) * lerpSpeed;

        const dist = Math.hypot(n.tx - n.bx, n.ty - n.by, n.tz - n.bz);
        if (dist < 0.015) n.chasing = false;
      }

      // Organic drift
      const driftAmt = BASE_DRIFT * (1 + chaos * 6) / n.mass;
      n.vx += (Math.random() - 0.5) * driftAmt;
      n.vy += (Math.random() - 0.5) * driftAmt;
      n.vz += (Math.random() - 0.5) * driftAmt;

      // Soft sphere boundary repulsion
      const dist = Math.sqrt(n.bx*n.bx + n.by*n.by + n.bz*n.bz);
      if (dist > 0.92) {
        const push = (dist - 0.92) * 0.04;
        n.vx -= (n.bx / dist) * push;
        n.vy -= (n.by / dist) * push;
        n.vz -= (n.bz / dist) * push;
      }

      // Damping
      const damp = 0.955 - chaos * 0.04;
      n.vx *= damp; n.vy *= damp; n.vz *= damp;

      // Integrate
      n.bx += n.vx;
      n.by += n.vy;
      n.bz += n.vz;

      // Decay glow
      if (n.glow > 0) n.glow *= 0.88;
    });

    // Signals
    signals.forEach(sig => {
      sig.t += sig.speed * (1 + chaos * 1.5);
      if (sig.t >= 1) {
        sig.from = Math.floor(Math.random() * nodes.length);
        sig.to   = Math.floor(Math.random() * nodes.length);
        while (sig.to === sig.from) sig.to = Math.floor(Math.random() * nodes.length);
        sig.t = 0;
        sig.speed = 0.012 + Math.random() * 0.018;
      }
    });
  }

  // ── Project all nodes ─────────────────────────────────────────────────
  nodes.forEach(project);

  // ── Rebuild connections every 3 frames ───────────────────────────────
  if (frame % 3 === 0) rebuildConnections();

  // ── Z-sorted render list ──────────────────────────────────────────────
  const renderList = [];

  connections.forEach(c => {
    renderList.push({ type: 'conn', z: (c.a.depth + c.b.depth) * 0.5, obj: c });
  });
  nodes.forEach(n => {
    renderList.push({ type: 'node', z: n.depth, obj: n });
  });
  signals.forEach(sig => {
    const a = nodes[sig.from], b = nodes[sig.to];
    if (!a || !b) return;
    const z = a.depth + (b.depth - a.depth) * sig.t;
    renderList.push({ type: 'signal', z, obj: sig });
  });

  // back-to-front
  renderList.sort((a, b) => b.z - a.z);

  renderList.forEach(item => {
    if      (item.type === 'conn')   drawConnection(item.obj);
    else if (item.type === 'node')   drawNode(item.obj);
    else if (item.type === 'signal') drawSignal(item.obj);
  });
}

loop();
</script>
</body>
</html>
