<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Rotating Neural Network</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; overflow: hidden; width: 100vw; height: 100vh; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  init();
});

// Dense layer definitions — many more nodes, many more layers
const LAYER_DEFS   = [10, 18, 26, 34, 40, 46, 50, 54, 56, 56, 54, 52, 50, 48, 44, 40, 36, 32, 28, 24, 20, 16, 12, 10];
const INPUT_LABELS  = ['S', 'T', 'D'];
const OUTPUT_LABELS = ['STUDY', 'TO', 'DEATH'];
const BRANCH_CUTOFF = 3;
const MAX_SIGNALS   = 220;
const SPAWN_EVERY   = 2;
const BASE_SPEED    = 0.013;
const SPEED_VAR     = 0.006;

let layers = [], connections = [], streams = [], signals = [], allNeurons = [];
// Two independent rotation angles for X and Y axes to create full 3D tumble
let angleY = 0;
let angleX = 0;

function buildNetwork() {
  layers = []; connections = []; allNeurons = [];

  const margin  = W * 0.02;
  const usableW = W - margin * 2;
  const gap     = usableW / (LAYER_DEFS.length - 1);

  // Full volumetric spread: Z depth matches the larger of W and H
  const volumeDepth = Math.max(W, H) * 1.15;

  LAYER_DEFS.forEach((count, li) => {
    const x       = margin + li * gap;
    const usableH = H * 0.98;
    const top     = H * 0.01;
    const neurons = [];
    const spacing = usableH / (count + 1);

    for (let ni = 0; ni < count; ni++) {
      const y = top + spacing * (ni + 1);

      const baseX = x - W / 2;
      // Add strong Y jitter (±40% of inter-node spacing) to break flat horizontal bands
      const yJitter = (Math.random() - 0.5) * spacing * 0.85;
      const baseY = (y - H / 2) + yJitter;
      // Z spread equals full volume depth — network is as deep as it is wide/tall
      const baseZ = (Math.random() - 0.5) * volumeDepth;

      const neuron = { baseX, baseY, baseZ, r: 3.5, glow: 0, x: 0, y: 0, z: 0, scale: 1 };

      if (li === 0 && ni < INPUT_LABELS.length) {
        neuron.label     = INPUT_LABELS[ni];
        neuron.labelSize = 8;
        neuron.labelAlign = 'center';
      } else if (li === LAYER_DEFS.length - 1 && ni < OUTPUT_LABELS.length) {
        neuron.label     = OUTPUT_LABELS[ni];
        neuron.labelSize = 7;
        neuron.labelAlign = 'left';
      }

      neurons.push(neuron);
      allNeurons.push(neuron);
    }
    layers.push({ neurons });
  });

  // Connections — sparser sampling on dense layers to stay readable
  for (let li = 0; li < layers.length - 1; li++) {
    const aSide = LAYER_DEFS[li];
    const bSide = LAYER_DEFS[li + 1];
    const density = (aSide <= 10 || bSide <= 10) ? 1.0 : 0.16;

    layers[li].neurons.forEach(a => {
      layers[li + 1].neurons.forEach(b => {
        if (Math.random() < density) {
          connections.push({ a, b, layer: li, glow: 0 });
        }
      });
    });
  }
}

function buildStreams() {
  streams = [];

  function recurse(neuron, li, path) {
    if (li === LAYER_DEFS.length - 1) {
      if (path.length > 0) streams.push(path);
      return;
    }
    const outs = connections.filter(c => c.a === neuron);
    if (!outs.length) return;

    if (li < BRANCH_CUTOFF) {
      const maxFan = li <= 1 ? outs.length : Math.min(outs.length, 3);
      outs.slice().sort(() => Math.random() - 0.5).slice(0, maxFan)
          .forEach(conn => recurse(conn.b, li + 1, [...path, conn]));
    } else {
      const conn = outs[Math.floor(Math.random() * outs.length)];
      if (conn) recurse(conn.b, li + 1, [...path, conn]);
    }
  }

  layers[0].neurons.forEach(n => recurse(n, 0, []));

  if (streams.length < 30) {
    layers[1]?.neurons.forEach(n => recurse(n, 1, []));
  }
}

function makeSignal(streamIdx, startProgress) {
  return {
    si:       streamIdx,
    progress: startProgress ?? 0,
    speed:    BASE_SPEED + Math.random() * SPEED_VAR,
  };
}

function spawnSignal() {
  if (!streams.length) return;
  const si = Math.floor(Math.random() * streams.length);
  signals.push(makeSignal(si, 0));
}

function preloadSignals() {
  signals = [];
  const count = Math.min(MAX_SIGNALS, Math.max(streams.length, 1));
  for (let i = 0; i < count; i++) {
    const si = i % streams.length;
    const stream = streams[si];
    const progress = (stream.length * i) / count % stream.length;
    signals.push(makeSignal(si, progress));
  }
}

function init() {
  buildNetwork();
  buildStreams();
  preloadSignals();
}
init();

function getPosOnStream(stream, progress) {
  const ci  = Math.min(Math.floor(progress), stream.length - 1);
  const t   = progress - Math.floor(progress);
  const c   = stream[ci];
  return { x: c.a.x + (c.b.x - c.a.x) * t, y: c.a.y + (c.b.y - c.a.y) * t, conn: c, t, ci };
}

function drawSingleConnection(c) {
  ctx.beginPath();
  ctx.moveTo(c.a.x, c.a.y);
  ctx.lineTo(c.b.x, c.b.y);
  const g = c.glow;
  const avgScale = (c.a.scale + c.b.scale) / 2;
  ctx.strokeStyle = g > 0 ? `rgba(0,0,0,${0.055 + g * 0.18})` : 'rgba(0,0,0,0.038)';
  ctx.lineWidth   = (g > 0 ? 0.75 : 0.3) * avgScale;
  ctx.stroke();
}

function drawSingleNeuron(n) {
  const g = n.glow;
  const r = n.r * n.scale;

  if (g > 0.05) {
    ctx.beginPath();
    ctx.arc(n.x, n.y, r + 5 * g * n.scale, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,0,0,${0.055 * g})`;
    ctx.fill();
  }

  ctx.beginPath();
  ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
  ctx.fillStyle   = g > 0.3 ? `rgba(0,0,0,${0.15 + g * 0.85})` : '#fff';
  ctx.strokeStyle = `rgba(0,0,0,${0.35 + g * 0.65})`;
  ctx.lineWidth   = (1.1 + g * 0.5) * n.scale;
  ctx.fill();
  ctx.stroke();

  if (n.label) {
    ctx.font         = `bold ${Math.max(1, n.labelSize * n.scale)}px monospace`;
    ctx.textAlign    = n.labelAlign;
    ctx.textBaseline = 'middle';
    let lx = n.x;
    if (n.labelAlign === 'left') {
      lx += r + 4 * n.scale;
      ctx.fillStyle = '#000';
    } else {
      ctx.fillStyle = n.glow > 0.4 ? '#fff' : '#000';
    }
    ctx.fillText(n.label, lx, n.y);
  }
}

function drawSingleSignal(sig, pos) {
  const { x, y, conn, t } = pos;
  const trailT  = Math.max(0, t - 0.14);
  const trailX  = conn.a.x + (conn.b.x - conn.a.x) * trailT;
  const trailY  = conn.a.y + (conn.b.y - conn.a.y) * trailT;
  const avgScale = conn.a.scale + (conn.b.scale - conn.a.scale) * t;

  ctx.beginPath();
  ctx.moveTo(trailX, trailY);
  ctx.lineTo(x, y);
  ctx.strokeStyle = `rgba(0,0,0,${0.26 * (1 - t * 0.35)})`;
  ctx.lineWidth   = 1.2 * avgScale;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(x, y, 2.5 * avgScale, 0, Math.PI * 2);
  ctx.fillStyle = '#000';
  ctx.fill();

  conn.glow = Math.max(conn.glow, 0.9);
  if (t > 0.85) conn.b.glow = Math.max(conn.b.glow, (t - 0.85) / 0.15);
  if (t < 0.15) conn.a.glow = Math.max(conn.a.glow, 1 - t / 0.15);
}

let frame = 0;

function loop() {
  requestAnimationFrame(loop);
  frame++;

  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);

  allNeurons.forEach(n => { if (n.glow > 0) n.glow *= 0.87; });
  connections.forEach(c => { if (c.glow > 0) c.glow *= 0.84; });

  if (frame % SPAWN_EVERY === 0 && signals.length < MAX_SIGNALS) spawnSignal();

  signals.forEach(sig => {
    const stream = streams[sig.si];
    if (!stream) return;
    sig.progress += sig.speed;
    if (sig.progress >= stream.length) {
      sig.si       = Math.floor(Math.random() * streams.length);
      sig.progress = 0;
      sig.speed    = BASE_SPEED + Math.random() * SPEED_VAR;
      if (streams[sig.si]?.[0]) streams[sig.si][0].a.glow = 1;
    }
  });

  // Dual-axis rotation: Y-axis spin + gentle X-axis tumble = true cosmic tumble
  angleY += 0.004;
  angleX += 0.0015;

  const cosY = Math.cos(angleY), sinY = Math.sin(angleY);
  const cosX = Math.cos(angleX), sinX = Math.sin(angleX);

  // Focal distance scaled to the full volume depth so far-away nodes stay visible
  const focal = Math.max(W, H) * 2.4;

  allNeurons.forEach(n => {
    // Rotate around Y axis first
    const rx1 = n.baseX * cosY - n.baseZ * sinY;
    const rz1 = n.baseX * sinY + n.baseZ * cosY;
    const ry1 = n.baseY;
    // Then rotate around X axis
    const ry2 = ry1 * cosX - rz1 * sinX;
    const rz2 = ry1 * sinX + rz1 * cosX;
    const rx2 = rx1;

    const scale = focal / (focal + rz2);
    n.x     = W / 2 + rx2 * scale;
    n.y     = H / 2 + ry2 * scale;
    n.scale = scale;
    n.z     = rz2;
  });

  const renderList = [];
  connections.forEach(c => {
    renderList.push({ type: 'conn',   z: (c.a.z + c.b.z) / 2, obj: c });
  });
  allNeurons.forEach(n => {
    renderList.push({ type: 'neuron', z: n.z, obj: n });
  });
  signals.forEach(sig => {
    const stream = streams[sig.si];
    if (!stream) return;
    const pos = getPosOnStream(stream, sig.progress);
    const z = pos.conn.a.z + (pos.conn.b.z - pos.conn.a.z) * pos.t;
    renderList.push({ type: 'signal', z, obj: sig, pos });
  });

  renderList.sort((a, b) => b.z - a.z);
  renderList.forEach(item => {
    if      (item.type === 'conn')   drawSingleConnection(item.obj);
    else if (item.type === 'neuron') drawSingleNeuron(item.obj);
    else if (item.type === 'signal') drawSingleSignal(item.obj, item.pos);
  });
}

loop();
</script>
</body>
</html>
