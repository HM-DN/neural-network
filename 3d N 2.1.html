<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neural Network</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1080, H = 1920;
canvas.width = W;
canvas.height = H;
canvas.style.aspectRatio = '9/16';

// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
const LAYER_DEFS    = [3, 5, 8, 11, 13, 13, 11, 8, 5, 3];
const INPUT_LABELS  = ['α', 'β', 'γ'];
const OUTPUT_LABELS = ['δ', 'ε', 'ζ'];
const BRANCH_CUTOFF = 3;
const MAX_SIGNALS   = 70;
const SPAWN_EVERY   = 3;
const BASE_SPEED    = 0.010;
const SPEED_VAR     = 0.008;

const MAX_PARTICLES = 130;
const BASE_PDIST    = 175;
const BASE_PDIST_SQ = BASE_PDIST * BASE_PDIST;
const HUB_PDIST     = 310;
const HUB_PDIST_SQ  = HUB_PDIST * HUB_PDIST;

let layers = [], connections = [], streams = [], signals = [];
let particles = [];
let allNeurons = [];

// ═══════════════════════════════════════════════════════════
// BUILD STRUCTURED NETWORK
// ═══════════════════════════════════════════════════════════
function buildNetwork() {
  layers = []; connections = []; allNeurons = [];

  const marginX = W * 0.075;
  const marginY = H * 0.055;
  const usableW = W - marginX * 2;
  const usableH = H - marginY * 2;
  const gap     = usableW / (LAYER_DEFS.length - 1);

  LAYER_DEFS.forEach((count, li) => {
    const x       = marginX + li * gap;
    const neurons = [];
    for (let ni = 0; ni < count; ni++) {
      const y = marginY + (usableH / (count + 1)) * (ni + 1);
      const n = { x, y, r: 5.5, glow: 0, ring: 0 };
      neurons.push(n);
      allNeurons.push(n);
    }
    layers.push({ x, neurons });
  });

  for (let li = 0; li < layers.length - 1; li++) {
    layers[li].neurons.forEach(a => {
      layers[li + 1].neurons.forEach(b => {
        const forceAll = (LAYER_DEFS[li] <= 3 || LAYER_DEFS[li + 1] <= 3);
        if (forceAll || Math.random() < 0.46) {
          connections.push({ a, b, layer: li, glow: 0, w: 0 });
        }
      });
    });
  }
}

function buildStreams() {
  streams = [];
  function recurse(neuron, li, path) {
    if (li === LAYER_DEFS.length - 1) {
      if (path.length > 0) streams.push(path);
      return;
    }
    const outs = connections.filter(c => c.a === neuron);
    if (!outs.length) return;
    if (li < BRANCH_CUTOFF) {
      const maxFan = li <= 1 ? outs.length : Math.min(outs.length, 3);
      outs.slice().sort(() => Math.random() - 0.5).slice(0, maxFan)
          .forEach(conn => recurse(conn.b, li + 1, [...path, conn]));
    } else {
      const conn = outs[Math.floor(Math.random() * outs.length)];
      recurse(conn.b, li + 1, [...path, conn]);
    }
  }
  layers[0].neurons.forEach(n => recurse(n, 0, []));
}

function makeSignal(si, startProgress) {
  return {
    si, progress: startProgress ?? 0,
    speed: BASE_SPEED + Math.random() * SPEED_VAR,
    bright: 0.6 + Math.random() * 0.4,
  };
}

function spawnSignal() {
  if (!streams.length) return;
  signals.push(makeSignal(Math.floor(Math.random() * streams.length), 0));
}

function preloadSignals() {
  signals = [];
  const count = Math.min(MAX_SIGNALS, streams.length);
  for (let i = 0; i < count; i++) {
    const si = i % streams.length;
    const progress = (streams[si].length * i) / count % streams[si].length;
    signals.push(makeSignal(si, progress));
  }
}

function getPosOnStream(stream, progress) {
  const ci  = Math.min(Math.floor(progress), stream.length - 1);
  const t   = progress - Math.floor(progress);
  const c   = stream[ci];
  return { x: c.a.x + (c.b.x - c.a.x) * t, y: c.a.y + (c.b.y - c.a.y) * t, conn: c, t };
}

// ═══════════════════════════════════════════════════════════
// CHAOTIC PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════════
function Particle(x, y) {
  this.x  = (x !== undefined) ? x : Math.random() * W;
  this.y  = (y !== undefined) ? y : Math.random() * H;
  const spd = 0.14 + Math.random() * (Math.random() < 0.09 ? 3.2 : 0.85);
  const ang = Math.random() * Math.PI * 2;
  this.vx  = Math.cos(ang) * spd;
  this.vy  = Math.sin(ang) * spd;
  this.life    = 0;
  this.maxLife = 12 + Math.random() * 42;
  this.hub     = Math.random() < 0.07;
}

function spawnBurst(cx, cy, n) {
  for (let i = 0; i < n && particles.length < MAX_PARTICLES; i++) {
    const p = new Particle(
      cx + (Math.random() - 0.5) * 110,
      cy + (Math.random() - 0.5) * 110
    );
    p.maxLife = 9 + Math.random() * 32;
    particles.push(p);
  }
}

function applyNeuronAttraction(p) {
  const ATTRACT_DIST = 220;
  const ATTRACT_FORCE = 0.012;
  for (let k = 0; k < allNeurons.length; k++) {
    const n  = allNeurons[k];
    const dx = n.x - p.x, dy = n.y - p.y;
    const d2 = dx*dx + dy*dy;
    if (d2 < ATTRACT_DIST * ATTRACT_DIST && d2 > 1) {
      const d   = Math.sqrt(d2);
      const f   = ATTRACT_FORCE * (1 - d / ATTRACT_DIST);
      p.vx += (dx / d) * f;
      p.vy += (dy / d) * f;
    }
  }
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
function init() {
  buildNetwork();
  buildStreams();
  preloadSignals();
}
init();

// ═══════════════════════════════════════════════════════════
// DRAW HELPERS
// ═══════════════════════════════════════════════════════════
function drawBatch(arr, lw, style) {
  if (!arr.length) return;
  ctx.beginPath();
  for (let i = 0; i < arr.length; i += 4) {
    ctx.moveTo(arr[i], arr[i+1]);
    ctx.lineTo(arr[i+2], arr[i+3]);
  }
  ctx.lineWidth   = lw;
  ctx.strokeStyle = style;
  ctx.stroke();
}

function drawConnections() {
  connections.forEach(c => {
    const g = c.glow;
    ctx.beginPath();
    ctx.moveTo(c.a.x, c.a.y);
    ctx.lineTo(c.b.x, c.b.y);
    if (g > 0) {
      ctx.strokeStyle = `rgba(30,30,30,${0.06 + g * 0.35})`;
      ctx.lineWidth   = 0.6 + g * 0.8;
    } else {
      ctx.strokeStyle = 'rgba(0,0,0,0.07)';
      ctx.lineWidth   = 0.35;
    }
    ctx.stroke();
  });
}

function drawNeurons() {
  layers.forEach((layer, li) => layer.neurons.forEach((n, ni) => {
    const g = n.glow;

    // outer glow halo
    if (g > 0.05) {
      const grad = ctx.createRadialGradient(n.x, n.y, n.r, n.x, n.y, n.r + 22 * g);
      grad.addColorStop(0, `rgba(0,0,0,${0.18 * g})`);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r + 22 * g, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // neuron body
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    if (g > 0.3) {
      const fill = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
      fill.addColorStop(0, `rgba(30,30,30,1)`);
      fill.addColorStop(1, `rgba(80,80,80,${0.5 + g * 0.5})`);
      ctx.fillStyle   = fill;
    } else {
      ctx.fillStyle   = 'rgba(255,255,255,0.85)';
    }
    ctx.strokeStyle = `rgba(0,0,0,${0.28 + g * 0.72})`;
    ctx.lineWidth   = 1.2 + g * 0.8;
    ctx.fill();
    ctx.stroke();

    // label
    if (li === 0 && ni < INPUT_LABELS.length) {
      ctx.font         = `bold ${n.r * 1.6}px serif`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle    = g > 0.4 ? '#fff' : 'rgba(0,0,0,0.85)';
      ctx.fillText(INPUT_LABELS[ni], n.x, n.y);
    }
    if (li === layers.length - 1 && ni < OUTPUT_LABELS.length) {
      ctx.font         = `bold ${n.r * 1.5}px serif`;
      ctx.textAlign    = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillStyle    = `rgba(0,0,0,${0.5 + g * 0.5})`;
      ctx.fillText(OUTPUT_LABELS[ni], n.x + n.r + 7, n.y);
    }
  }));
}

function drawSignals() {
  signals.forEach(sig => {
    const stream = streams[sig.si];
    if (!stream) return;
    const { x, y, conn, t } = getPosOnStream(stream, sig.progress);

    // trail
    const trailT = Math.max(0, t - 0.18);
    const trailX = conn.a.x + (conn.b.x - conn.a.x) * trailT;
    const trailY = conn.a.y + (conn.b.y - conn.a.y) * trailT;

    const trailGrad = ctx.createLinearGradient(trailX, trailY, x, y);
    trailGrad.addColorStop(0, 'rgba(0,0,0,0)');
    trailGrad.addColorStop(1, `rgba(0,0,0,${0.55 * sig.bright})`);
    ctx.beginPath();
    ctx.moveTo(trailX, trailY);
    ctx.lineTo(x, y);
    ctx.strokeStyle = trailGrad;
    ctx.lineWidth   = 1.8;
    ctx.stroke();

    // head glow
    const hg = ctx.createRadialGradient(x, y, 0, x, y, 6);
    hg.addColorStop(0, `rgba(0,0,0,${0.9 * sig.bright})`);
    hg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(x, y, 6, 0, Math.PI * 2);
    ctx.fillStyle = hg;
    ctx.fill();

    // head dot
    ctx.beginPath();
    ctx.arc(x, y, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = '#111';
    ctx.fill();

    conn.glow = Math.max(conn.glow, 0.85 * sig.bright);
    if (t > 0.85) conn.b.glow = Math.max(conn.b.glow, (t - 0.85) / 0.15 * sig.bright);
    if (t < 0.15) conn.a.glow = Math.max(conn.a.glow, (1 - t / 0.15) * sig.bright);
  });
}

function drawParticleLayer() {
  // spawn
  const batch = 4 + Math.floor(Math.random() * 9);
  for (let i = 0; i < batch && particles.length < MAX_PARTICLES; i++) particles.push(new Particle());
  if (Math.random() < 0.055) spawnBurst(Math.random()*W, Math.random()*H, 6 + Math.floor(Math.random()*13));
  if (Math.random() < 0.022) spawnBurst(Math.random()*W, Math.random()*H, 14 + Math.floor(Math.random()*18));

  // update
  const live = [];
  for (let k = 0; k < particles.length; k++) {
    const p = particles[k];
    applyNeuronAttraction(p);
    p.x += p.vx; p.y += p.vy; p.life++;
    if (p.life < p.maxLife) live.push(p);
  }
  particles = live;

  // proximity grouping (4 weight classes)
  const gA = [], gB = [], gC = [], gD = [];
  for (let i = 0; i < particles.length; i++) {
    const a = particles[i];
    for (let j = i + 1; j < particles.length; j++) {
      const b  = particles[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const d2 = dx*dx + dy*dy;
      const maxSq = (a.hub || b.hub) ? HUB_PDIST_SQ : BASE_PDIST_SQ;
      if (d2 < maxSq && d2 > 0.5) {
        const prox = 1 - Math.sqrt(d2) / Math.sqrt(maxSq);
        if      (prox > 0.65) { gA.push(a.x,a.y,b.x,b.y); gB.push(a.x,a.y,b.x,b.y); gC.push(a.x,a.y,b.x,b.y); gD.push(a.x,a.y,b.x,b.y); }
        else if (prox > 0.38) { gB.push(a.x,a.y,b.x,b.y); gC.push(a.x,a.y,b.x,b.y); gD.push(a.x,a.y,b.x,b.y); }
        else if (prox > 0.15) { gC.push(a.x,a.y,b.x,b.y); gD.push(a.x,a.y,b.x,b.y); }
        else                  { gD.push(a.x,a.y,b.x,b.y); }
      }
    }
  }

  ctx.lineCap = 'round';
  drawBatch(gA, 18, 'rgba(0,0,0,0.012)');
  drawBatch(gB, 6,  'rgba(0,0,0,0.038)');
  drawBatch(gC, 2,  'rgba(0,0,0,0.11)');
  drawBatch(gD, 0.5,'rgba(0,0,0,0.72)');
}

// ═══════════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════════
let frame = 0;

function loop() {
  requestAnimationFrame(loop);
  frame++;

  // Motion blur / persistence
  ctx.fillStyle = 'rgba(245,245,245,0.19)';
  ctx.fillRect(0, 0, W, H);

  // ── Glow decay ──
  layers.forEach(l => l.neurons.forEach(n => { if (n.glow > 0) n.glow *= 0.87; }));
  connections.forEach(c => { if (c.glow > 0) c.glow *= 0.84; });

  // ── Advance signals ──
  if (frame % SPAWN_EVERY === 0 && signals.length < MAX_SIGNALS) spawnSignal();
  signals.forEach(sig => {
    const stream = streams[sig.si];
    sig.progress += sig.speed;
    if (sig.progress >= stream.length) {
      sig.si       = Math.floor(Math.random() * streams.length);
      sig.progress = 0;
      sig.speed    = BASE_SPEED + Math.random() * SPEED_VAR;
      sig.bright   = 0.6 + Math.random() * 0.4;
      if (streams[sig.si].length) streams[sig.si][0].a.glow = 1;
    }
  });

  // ── RENDER ORDER: connections → particle web → signals → neurons ──
  drawConnections();
  drawParticleLayer();
  drawSignals();
  drawNeurons();

  // ── Subtle vignette ──
  const vgr = ctx.createRadialGradient(W/2, H/2, H*0.28, W/2, H/2, H*0.82);
  vgr.addColorStop(0, 'rgba(245,245,245,0)');
  vgr.addColorStop(1, 'rgba(220,220,220,0.52)');
  ctx.fillStyle = vgr;
  ctx.fillRect(0, 0, W, H);
}

// Seed light background
ctx.fillStyle = '#f5f5f5';
ctx.fillRect(0, 0, W, H);
loop();
</script>
</body>
</html>
